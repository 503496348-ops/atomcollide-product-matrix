/* ========================================
   AtomCollide v3 — Cyber-Tech Design System

:root {
  --abyss: #020617;
  --void: #060b1a;
  --deep: #0b132b;
  --navy: #111d3d;
  --slate: #1a2d56;
  --steel: #243b6e;
  --electric: #3366ff;
  --cyan: #00d4ff;
  --neon: #00f0ff;
  --mint: #2dd4bf;
  --amber: #f59e0b;
  --rose: #f472b6;
  --violet: #a78bfa;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --card-bg: rgba(11,19,43,0.82);
  --card-border: rgba(51,102,255,0.18);
  --glass: rgba(11,19,43,0.55);
  --glow-cyan: 0 0 20px rgba(0,212,255,0.4), 0 0 60px rgba(0,212,255,0.15);
  --glow-blue: 0 0 20px rgba(51,102,255,0.4), 0 0 60px rgba(51,102,255,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--abyss);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.7;
  overflow-x: hidden;
  position: relative;
}

/* ── Background Layers ── */

/* Layer 0: Perspective Grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    linear-gradient(rgba(51,102,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(51,102,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
  pointer-events: none;
}

/* Layer 1: Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  z-index: 0;
  pointer-events: none;
  opacity: 0.6;
}

/* Layer 2: Radial Vignette */
.page-vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(2,6,23,0.7) 100%);
  z-index: 0;
  pointer-events: none;
}

/* ── Dual Canvas System ── */
#particle-drift, #data-stream {

  width: 100%; height: 100%;

  pointer-events: none;
}
#data-stream { z-index: 2; opacity: 0.5; }

/* ── Content Wrapper ── */
.content-layer {
  position: relative;
  z-index: 10;
}

/* ── Top Navigation ── */
.top-nav {
  display: flex;

  padding: 16px 48px;
  background: rgba(6,11,26,0.78);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(51,102,255,0.12);
  position: sticky;
  top: 0;
  z-index: 200;
}
.top-nav::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 5%; right: 5%;

  background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3) 20%, rgba(0,240,255,0.6) 50%, rgba(0,240,255,0.3) 80%, transparent);
}
.nav-brand {

.nav-brand svg { width: 34px; height: 34px; }

/* ── System Status Bar ── */

/* ── Hero ── */
.hero {

.hero::before {

/* Atom Animation — Enhanced */
.hero-atom-wrap {
  position: relative;
  width: 200px; height: 200px;
  margin: 0 auto 36px;
}
.atom-core {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 40px; height: 40px;

.atom-ring {

  border-radius: 50%;
  border: 1px solid rgba(0,240,255,0.25);
  animation: ring-expand 3s ease-out infinite;
}
.atom-ring:nth-child(2) { animation-delay: 1s; }
.atom-ring:nth-child(3) { animation-delay: 2s; }
@keyframes ring-expand {
  0% { width: 40px; height: 40px; opacity: 0.6; }
  100% { width: 260px; height: 260px; opacity: 0; }
}

/* Orbits */
.atom-orbit {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 1px solid rgba(51,102,255,0.25);
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}
.atom-orbit::after {
  content: '';
  position: absolute;

.orbit-1::after { top: -4px; left: 50%; margin-left: -4px; }

.orbit-2::after { top: 50%; left: -4px; margin-top: -4px; }

.orbit-3::after { bottom: -4px; left: 50%; margin-left: -4px; }
.orbit-4 { width: 190px; height: 140px; margin: -70px 0 0 -95px; transform: rotateX(60deg) rotateY(-45deg); animation: orbit-spin 13s linear infinite reverse; }
.orbit-4::after { top: 30%; right: -4px; margin-top: -4px; }

@keyframes orbit-spin {
  from { transform: rotateX(72deg) rotate(0deg); }
  to { transform: rotateX(72deg) rotate(360deg); }
}

.hero-label {

.stats-row {

/* ── Knowledge Tree ── */
.tree-wrap {
  padding: 0 40px 40px;
  max-width: 1500px;
  margin: 0 auto;
}
.tree {
  display: flex;
  flex-direction: column;

}

.tree-root::after {

@keyframes border-pulse {

.tree-trunk {

@keyframes data-drop {

.tree-node:hover::before { left: 100%; }
.tree-node:hover {

.tree-line {

.engine-wrap {

.pipeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  margin-bottom: 50px;
}

/* Artery connector between layers */
.pipeline-connector {
  display: flex;

  justify-content: center;
  height: 44px;
  position: relative;
  z-index: 2;
}
.pipeline-connector .arrow-shaft {

  background: linear-gradient(to bottom, rgba(0,240,255,0.4), rgba(51,102,255,0.15));

}
.pipeline-connector .arrow-head {
  position: absolute;
  bottom: 0;
  left: 50%;

  border-left: 8px solid transparent;
  border-right: 8px solid transparent;

  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan);

}
@keyframes flow-up {
  0% { top: 90%; opacity: 0; }
  50% { opacity: 1; }

}

<!-- ====== Dual Particle System ====== -->
<script defer>
(function(){
  // ── Canvas 1: Drift particles with connections ──
  const c1 = document.getElementById('particle-drift');
  const ctx1 = c1.getContext('2d');
  let W, H, drifters = [];

  function resize() {
    W = c1.width = window.innerWidth;
    H = c1.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); initDrifters(); });

  function initDrifters() {
    drifters = [];
    const N = 90;
    for (let i = 0; i < N; i++) {
      drifters.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.6 + 0.4,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        a: Math.random() * 0.4 + 0.12,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  initDrifters();

  function drawDrift() {
    ctx1.clearRect(0, 0, W, H);
    const t = Date.now() * 0.0015;
    drifters.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20;
      if (p.y > H + 20) p.y = -20;
      const alpha = p.a * (0.65 + 0.35 * Math.sin(p.phase + t));
      ctx1.beginPath();
      ctx1.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx1.fillStyle = `rgba(0,212,255,${alpha})`;
      ctx1.fill();
    });
    // Connections
    for (let i = 0; i < drifters.length; i++) {
      for (let j = i + 1; j < drifters.length; j++) {
        const dx = drifters[i].x - drifters[j].x;
        const dy = drifters[i].y - drifters[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 130) {
          ctx1.beginPath();
          ctx1.moveTo(drifters[i].x, drifters[i].y);
          ctx1.lineTo(drifters[j].x, drifters[j].y);
          ctx1.strokeStyle = `rgba(0,212,255,${0.04 * (1 - d/130)})`;
          ctx1.lineWidth = 0.5;
          ctx1.stroke();
        }
      }
    }
    requestAnimationFrame(drawDrift);
  }
  drawDrift();

  // ── Canvas 2: Data stream drops ──
  const c2 = document.getElementById('data-stream');
  const ctx2 = c2.getContext('2d');
  let drops = [];

  function initDrops() {
    drops = [];
    const N = 35;
    for (let i = 0; i < N; i++) {
      drops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        len: Math.random() * 60 + 20,
        speed: Math.random() * 0.6 + 0.2,
        a: Math.random() * 0.18 + 0.04
      });
    }
  }
  initDrops();

  function drawDrops() {
    ctx2.clearRect(0, 0, W, H);
    drops.forEach(d => {
      d.y += d.speed;
      if (d.y > H + d.len) { d.y = -d.len; d.x = Math.random() * W; }
      const grad = ctx2.createLinearGradient(d.x, d.y - d.len, d.x, d.y);
      grad.addColorStop(0, 'rgba(0,240,255,0)');
      grad.addColorStop(0.6, `rgba(0,240,255,${d.a})`);
      grad.addColorStop(1, 'rgba(0,240,255,0)');
      ctx2.beginPath();
      ctx2.moveTo(d.x, d.y - d.len);
      ctx2.lineTo(d.x, d.y);
      ctx2.strokeStyle = grad;
      ctx2.lineWidth = 1;
      ctx2.stroke();
    });
    requestAnimationFrame(drawDrops);
  }
  drawDrops();

  // ── Card mouse tracking ──
  document.querySelectorAll('.holo-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      card.style.setProperty('--mx', x + '%');
      card.style.setProperty('--my', y + '%');
    });
  });

  // ── Value card mouse tracking ──
  document.querySelectorAll('.val-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      card.style.setProperty('--mx', x + '%');
      card.style.setProperty('--my', y + '%');
    });
  });
})();
</script>
